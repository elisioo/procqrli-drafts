<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProqrLi - Create Workspace</title>
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="register.css" />
  </head>
  <body>
    <div class="signup-container">
      <!-- Logo -->
      <div class="logo">
        <img src="../logo/logo.png" alt="ProqrLi Logo" />
      </div>

      <h1>Create your workspace</h1>
      <p class="sub">
        Start managing procurement, vendors, and risk — all in one place.
      </p>

      <form id="signup-form">
        <div class="field">
          <label class="field-label" for="email">Work email</label>
          <input
            type="email"
            id="email"
            placeholder="you@company.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="field">
          <label class="field-label" for="fullname">Full name</label>
          <input
            type="text"
            id="fullname"
            placeholder="Alex Rivera"
            autocomplete="name"
            required
          />
        </div>

        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••••"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="field">
          <label class="field-label" for="confirm-password"
            >Confirm password</label
          >
          <input
            type="password"
            id="confirm-password"
            placeholder="••••••••••"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="options-row">
          <label class="check-label">
            <input type="checkbox" required />
            I agree to the
            <a href="#" style="color: #181714; text-decoration: underline"
              >Terms</a
            >
            and
            <a href="#" style="color: #181714; text-decoration: underline"
              >Privacy Policy</a
            >
          </label>
        </div>

        <button type="submit" class="btn-primary">Create free workspace</button>
      </form>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">OR</span>
        <div class="divider-line"></div>
      </div>

      <button class="btn-sso">
        <i class="bi bi-google"></i>
        Continue with Google
      </button>

      <button class="btn-sso">
        <svg
          width="14"
          height="14"
          viewBox="0 0 20 20"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect
            x="2"
            y="2"
            width="7"
            height="7"
            rx="1"
            fill="#9A978E"
            opacity="0.65"
          />
          <rect
            x="11"
            y="2"
            width="7"
            height="7"
            rx="1"
            fill="#9A978E"
            opacity="0.65"
          />
          <rect
            x="2"
            y="11"
            width="7"
            height="7"
            rx="1"
            fill="#9A978E"
            opacity="0.65"
          />
          <rect
            x="11"
            y="11"
            width="7"
            height="7"
            rx="1"
            fill="#9A978E"
            opacity="0.65"
          />
        </svg>
        Login with SSO
      </button>

      <p class="signup">
        Already have an account? <a href="login.html">Sign in →</a>
      </p>
    </div>

    <script>
      // Simple form submission simulation → redirect to onboarding
      document
        .getElementById("signup-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          // In a real app this would POST to backend
          alert(
            "✅ Account created successfully! Redirecting to onboarding...",
          );
          window.location.href = "onboarding.html";
        });
    </script>
  </body>
</html>
